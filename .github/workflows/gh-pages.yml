name: github pages

on:
  push:
    branches:
      - master
  workflow_dispatch: null

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true # could be useful in the future
          fetch-depth: 0   # we just need the latest commit

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.5.2'

      - name: Install mdbook-mermaid-ssr
        run: cargo install mdbook-mermaid-ssr --version 0.3.0 --locked

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Expose Chrome for mdbook-mermaid-ssr
        run: |
          mkdir -p /tmp/chrome-bin
          ln -sf "${{ steps.setup-chrome.outputs.chrome-path }}" /tmp/chrome-bin/google-chrome
          /tmp/chrome-bin/google-chrome --version

      - name: Build mdbook
        working-directory: ./cookbook
        run: PATH="/tmp/chrome-bin:$PATH" mdbook build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cookbook/book
